<title>Shopping List</title>
<style>
  :root{
    --bg:#fbf7f2;
    --surface:#ffffff;
    --ink:#2b2438;
    --muted:#9a93a6;
    --line:#efe7e0;
    --accent:#ff5c8a;
    --accent-2:#ffb23e;
    --go:#2fbf71;
    --radius:18px;
    --shadow:0 10px 30px -12px rgba(43,36,56,.25);
    --font:ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN", Quicksand, Nunito, "Segoe UI", Roboto, system-ui, -apple-system, sans-serif;
  }

  *{box-sizing:border-box;}
  [hidden]{display:none !important;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:var(--bg);
    min-height:100vh;
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }

  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;}

  .app{
    max-width:560px;
    margin:0 auto;
    padding:0 16px calc(40px + env(safe-area-inset-bottom));
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin:30px 4px 22px;
  }
  header h1{
    font-size:32px;
    font-weight:700;
    margin:0 0 3px;
    letter-spacing:-.6px;
    color:var(--accent);
  }
  header .count{
    font-size:15px;
    font-weight:500;
    color:var(--muted);
  }
  .theme-btn{
    flex:0 0 auto;
    align-self:flex-start;
    margin-top:4px;
    display:inline-flex;
    align-items:center;
    gap:7px;
    font-family:var(--font);
    font-size:13px;
    font-weight:600;
    color:var(--accent);
    background:var(--surface);
    border:2px solid var(--line);
    border-radius:12px;
    padding:8px 13px;
    cursor:pointer;
    transition:border-color .15s ease;
  }
  .theme-btn::before{
    content:"";
    width:13px; height:13px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
  }
  .theme-btn:hover{border-color:var(--accent);}
  .theme-btn:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}

  /* ---------- Theme panel ---------- */
  .theme-panel{
    background:var(--surface);
    border:2px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
  }
  .presets{display:flex; gap:16px; flex-wrap:wrap; margin-bottom:18px;}
  .preset{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .swatch{
    width:38px; height:38px; border-radius:50%;
    border:none; cursor:pointer; padding:0;
    transition:transform .12s ease;
  }
  .swatch:hover{transform:scale(1.08);}
  .swatch:focus-visible{outline:3px solid var(--ink); outline-offset:3px;}
  .swatch-name{font-size:11px; font-weight:600; color:var(--muted);}
  .pickers{display:grid; grid-template-columns:repeat(2,1fr); gap:11px 18px;}
  .picker{display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:14px; font-weight:500; color:var(--ink);}
  .picker input[type=color]{
    -webkit-appearance:none; appearance:none;
    width:44px; height:30px; border:2px solid var(--line); border-radius:9px;
    background:none; cursor:pointer; padding:0;
  }
  .picker input[type=color]::-webkit-color-swatch-wrapper{padding:2px;}
  .picker input[type=color]::-webkit-color-swatch{border:none; border-radius:5px;}
  .picker input[type=color]::-moz-color-swatch{border:none; border-radius:5px;}
  .theme-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:18px;}
  .ghost-btn,.solid-btn{
    font-family:var(--font); font-size:14px; font-weight:600;
    cursor:pointer; border-radius:12px; padding:10px 16px;
  }
  .ghost-btn{background:transparent; border:2px solid var(--line); color:var(--muted);}
  .ghost-btn:hover{color:var(--accent); border-color:var(--accent);}
  .solid-btn{background:linear-gradient(135deg,var(--accent),var(--accent-2)); border:none; color:#fff;}
  .ghost-btn:focus-visible,.solid-btn:focus-visible{outline:3px solid var(--ink); outline-offset:2px;}

  /* ---------- Add bar ---------- */
  .add{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:22px;
    position:sticky;
    top:0;
    z-index:5;
    background:var(--bg);
    padding:10px 0 6px;
  }
  .add-row{display:flex; gap:10px;}
  .add input{
    flex:1; min-width:0;
    font-family:var(--font); font-size:16px; font-weight:500; color:var(--ink);
    padding:15px 18px;
    border:2px solid var(--line); border-radius:var(--radius);
    background:var(--surface); box-shadow:var(--shadow);
    outline:none; transition:border-color .18s ease;
  }
  .add input::placeholder{color:var(--muted); font-weight:400;}
  .add input:focus-visible{border-color:var(--accent);}
  .group-input{font-size:14px !important; padding:11px 16px !important; border-radius:14px !important;}
  .add button{
    flex:0 0 auto; width:54px;
    font-family:var(--font); font-size:30px; font-weight:500; line-height:1; color:#fff;
    border:none; border-radius:var(--radius);
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    box-shadow:0 12px 24px -10px rgba(255,92,138,.8);
    cursor:pointer; transition:transform .12s ease, filter .18s ease;
  }
  .add button:hover{filter:brightness(1.05);}
  .add button:active{transform:scale(.92);}
  .add button:focus-visible{outline:3px solid var(--ink); outline-offset:2px;}

  /* ---------- Groups ---------- */
  .group-head{
    display:flex; align-items:center; gap:10px;
    margin:20px 4px 10px;
    font-size:13px; font-weight:700;
    letter-spacing:.5px; text-transform:uppercase;
    color:var(--muted);
  }
  .group-count{
    margin-left:auto;
    font-size:12px; font-weight:700; color:#fff;
    background:var(--accent);
    min-width:22px; height:22px; padding:0 7px;
    border-radius:11px;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .group-list{list-style:none; margin:0; padding:0;}
  .group-list.drop-empty{
    min-height:56px;
    border:2px dashed var(--line);
    border-radius:var(--radius);
    margin-bottom:10px;
  }
  .drop-hint{
    list-style:none; text-align:center;
    color:var(--muted); font-size:13px; padding:18px 10px;
  }

  /* ---------- Items ---------- */
  .item{
    display:flex; align-items:center; gap:12px;
    padding:14px 14px; margin-bottom:10px;
    background:var(--surface);
    border-radius:var(--radius);
    box-shadow:0 6px 18px -12px rgba(43,36,56,.3);
    animation:pop-in .32s cubic-bezier(.2,.9,.3,1.3);
    overflow:hidden;
  }
  @keyframes pop-in{
    from{opacity:0; transform:translateY(8px) scale(.97);}
    to{opacity:1; transform:none;}
  }
  .item.leaving{
    animation:none; opacity:0; transform:translateX(40px);
    margin-bottom:0; padding-top:0; padding-bottom:0; max-height:0;
    transition:opacity .35s ease, transform .35s ease,
               max-height .35s ease .05s, padding .35s ease .05s, margin .35s ease .05s;
  }
  .item.dragging{
    position:fixed; z-index:1000;
    box-shadow:0 20px 44px -10px rgba(0,0,0,.35);
    transform:scale(1.02) rotate(-1deg);
    cursor:grabbing; animation:none; margin:0;
  }
  .item.placeholder{
    background:transparent; border:2px dashed var(--accent);
    box-shadow:none; animation:none;
  }
  .item.flash{ outline:3px solid transparent; outline-offset:2px; animation:flash-pulse 1.3s ease; }
  @keyframes flash-pulse{
    0%,100%{ outline-color:transparent; }
    20%,60%{ outline-color:var(--accent); }
  }

  .handle{
    flex:0 0 auto;
    width:26px; height:36px;
    border:none; background:transparent; color:var(--muted);
    font-size:19px; line-height:1; cursor:grab;
    border-radius:8px; touch-action:none; opacity:.55; padding:0;
    display:flex; align-items:center; justify-content:center;
    transition:opacity .15s ease, color .15s ease;
  }
  .handle:hover{opacity:1; color:var(--accent);}
  .handle:active{cursor:grabbing;}
  .handle:focus-visible{outline:3px solid var(--accent); outline-offset:2px; opacity:1;}

  .tick{
    flex:0 0 auto; width:28px; height:28px;
    border-radius:50%; border:2.5px solid var(--line);
    background:var(--surface); cursor:pointer; position:relative; padding:0;
    transition:border-color .15s ease, background .15s ease, transform .12s ease;
  }
  .tick:hover{border-color:var(--go);}
  .tick:active{transform:scale(.85);}
  .tick:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  .tick svg{
    position:absolute; inset:0; margin:auto; width:16px; height:16px;
    stroke:#fff; stroke-width:3.5; stroke-linecap:round; stroke-linejoin:round; fill:none;
    stroke-dasharray:24; stroke-dashoffset:24;
  }
  .item.checked .tick{background:var(--go); border-color:var(--go); animation:tick-pop .35s cubic-bezier(.2,.9,.3,1.5);}
  .item.checked .tick svg{stroke-dashoffset:0; transition:stroke-dashoffset .3s ease .08s;}
  @keyframes tick-pop{0%{transform:scale(1);}45%{transform:scale(1.25);}100%{transform:scale(1);}}

  .label{
    flex:1; min-width:0; font-size:17px; font-weight:500; word-break:break-word;
    cursor:text; position:relative; transition:color .25s ease;
  }
  .label:focus-visible{outline:3px solid var(--accent); outline-offset:3px; border-radius:6px;}
  .label::after{
    content:""; position:absolute; left:0; top:52%; height:2.5px; width:0;
    border-radius:2px; background:var(--muted); transition:width .3s ease;
  }
  .item.checked .label{color:var(--muted);}
  .item.checked .label::after{width:100%;}
  .label-wrap{flex:1; min-width:0; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .label-wrap .label{flex:0 1 auto;}
  .chip{
    font-size:11px; font-weight:600; color:var(--muted);
    background:var(--bg); border:1px solid var(--line);
    border-radius:8px; padding:2px 8px;
  }

  .group-name{
    font:inherit; color:inherit; letter-spacing:inherit; text-transform:inherit;
    background:none; border:none; text-align:left; cursor:text;
    padding:2px 5px; margin:-2px -5px; border-radius:6px;
  }
  .group-name:hover{color:var(--accent);}
  .group-name:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}

  .edit-input{
    flex:1; min-width:0; width:100%;
    font-family:var(--font); font-size:17px; font-weight:500; color:var(--ink);
    border:2px solid var(--accent); border-radius:10px; padding:6px 10px;
    background:var(--surface); outline:none;
  }
  .edit-input.edit-group{
    width:auto; max-width:220px;
    font-size:13px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
    border-radius:8px; padding:4px 8px;
  }

  .del{
    flex:0 0 auto; width:34px; height:34px;
    border:none; background:transparent; color:var(--muted);
    font-size:22px; line-height:1; border-radius:10px; cursor:pointer; opacity:.55;
    transition:color .15s ease, background .15s ease, opacity .15s ease;
  }
  .del:hover{color:var(--accent); background:rgba(255,92,138,.08); opacity:1;}
  .del:focus-visible{outline:3px solid var(--accent); outline-offset:2px; opacity:1;}

  /* ---------- Done section ---------- */
  .done-head{
    display:flex; align-items:center; gap:8px; width:100%;
    margin:22px 0 12px; padding:6px 4px;
    border:none; background:transparent;
    font-family:var(--font); font-size:14px; font-weight:600;
    letter-spacing:.4px; text-transform:uppercase; color:var(--muted); cursor:pointer;
  }
  .done-head:focus-visible{outline:3px solid var(--accent); outline-offset:2px; border-radius:8px;}
  .done-head .chev{transition:transform .25s ease; font-size:12px;}
  .done-head[aria-expanded="true"] .chev{transform:rotate(90deg);}
  .done-head .rule{flex:1; height:2px; background:var(--line); border-radius:2px;}
  .done-list{list-style:none; margin:0; padding:0;}
  .clear{
    display:block; margin:14px auto 0; padding:11px 22px;
    border:2px solid var(--line); background:var(--surface); border-radius:14px;
    font-family:var(--font); font-size:14px; font-weight:600; color:var(--muted); cursor:pointer;
    transition:color .15s ease, border-color .15s ease;
  }
  .clear:hover{color:var(--accent); border-color:var(--accent);}
  .clear:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}

  /* ---------- Previously added ---------- */
  .history-panel{
    background:var(--surface); border:2px solid var(--line); border-radius:var(--radius);
    padding:14px; margin:0 0 20px; box-shadow:var(--shadow);
  }
  .history-bar{display:flex; gap:10px; margin-bottom:13px;}
  .history-filter{
    flex:1; min-width:0;
    font-family:var(--font); font-size:14px; font-weight:500; color:var(--ink);
    padding:10px 14px; border:2px solid var(--line); border-radius:12px; background:var(--bg); outline:none;
    transition:border-color .15s ease;
  }
  .history-filter::placeholder{color:var(--muted); font-weight:400;}
  .history-filter:focus-visible{border-color:var(--accent);}
  .history-edit{
    flex:0 0 auto;
    font-family:var(--font); font-size:13px; font-weight:600; color:var(--muted);
    background:transparent; border:2px solid var(--line); border-radius:12px; padding:8px 16px; cursor:pointer;
    transition:color .15s ease, background .15s ease, border-color .15s ease;
  }
  .history-edit[aria-pressed="true"]{color:#fff; background:var(--accent); border-color:var(--accent);}
  .history-edit:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  .history-chips{display:flex; flex-wrap:wrap; gap:8px;}
  .hist-chip{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--font); font-size:14px; font-weight:600; color:var(--ink);
    background:var(--bg); border:2px solid var(--line); border-radius:999px;
    padding:8px 12px 8px 15px; cursor:pointer;
    transition:border-color .15s ease, transform .1s ease, opacity .15s ease;
  }
  .hist-chip:hover{border-color:var(--accent);}
  .hist-chip:active{transform:scale(.96);}
  .hist-chip:focus-visible{outline:3px solid var(--accent); outline-offset:2px;}
  .hist-chip-group{
    font-size:11px; font-weight:600; color:var(--muted);
    background:var(--surface); border:1px solid var(--line); border-radius:7px; padding:1px 6px;
  }
  .hist-chip-mark{font-size:17px; font-weight:700; line-height:1; color:var(--accent); width:16px; text-align:center;}
  .hist-chip.on-list{opacity:.5; cursor:default; border-style:dashed;}
  .hist-chip.on-list .hist-chip-mark{color:var(--go);}
  .hist-chip.on-list:hover{border-color:var(--line);}
  .hist-chip.editing{border-color:var(--accent);}
  .hist-chip.editing .hist-chip-mark{color:var(--accent);}
  .history-empty{color:var(--muted); font-size:14px; padding:8px 2px;}

  /* ---------- Empty state ---------- */
  .empty{text-align:center; padding:46px 20px; color:var(--muted);}
  .empty .emoji{font-size:50px; display:block; margin-bottom:14px;}
  .empty .big{font-size:19px; font-weight:600; color:var(--ink); margin-bottom:4px;}
  .empty .small{font-size:15px; font-weight:400;}

  footer{text-align:center; margin-top:34px; font-size:12.5px; font-weight:400; color:var(--muted); opacity:.8;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="head-text">
        <h1>Shopping List</h1>
        <div class="count" id="count">Nothing here yet</div>
      </div>
      <button class="theme-btn" id="themeBtn" type="button" aria-expanded="false" aria-controls="themePanel">Theme</button>
    </header>

    <section class="theme-panel" id="themePanel" hidden aria-label="Theme editor">
      <div class="presets" id="presets"></div>
      <div class="pickers">
        <label class="picker"><span>Background</span><input type="color" data-var="--bg"></label>
        <label class="picker"><span>Cards</span><input type="color" data-var="--surface"></label>
        <label class="picker"><span>Text</span><input type="color" data-var="--ink"></label>
        <label class="picker"><span>Accent</span><input type="color" data-var="--accent"></label>
        <label class="picker"><span>Accent 2</span><input type="color" data-var="--accent-2"></label>
        <label class="picker"><span>Checkmarks</span><input type="color" data-var="--go"></label>
      </div>
      <div class="theme-actions">
        <button type="button" class="ghost-btn" id="themeReset">Reset to default</button>
        <button type="button" class="solid-btn" id="themeClose">Done</button>
      </div>
    </section>

    <form class="add" id="addForm" autocomplete="off">
      <div class="add-row">
        <label for="newItem" class="sr-only">Add an item</label>
        <input id="newItem" type="text" placeholder="Add something&hellip;" enterkeyhint="done" maxlength="120">
        <button type="submit" aria-label="Add item">+</button>
      </div>
      <label for="newGroup" class="sr-only">Group (optional)</label>
      <input id="newGroup" class="group-input" type="text" placeholder="Group (optional)" enterkeyhint="done" maxlength="40" autocomplete="off">
    </form>

    <button class="done-head" id="historyToggle" type="button" aria-expanded="false" aria-controls="historyPanel" hidden>
      <span class="chev" aria-hidden="true">&#9654;</span>
      <span id="historyToggleLabel">Previously added</span>
      <span class="rule" aria-hidden="true"></span>
    </button>
    <section class="history-panel" id="historyPanel" hidden aria-label="Previously added items">
      <div class="history-bar">
        <label for="historyFilter" class="sr-only">Filter previously added items</label>
        <input id="historyFilter" class="history-filter" type="text" placeholder="Filter previous items" enterkeyhint="search" autocomplete="off">
        <button id="historyEdit" class="history-edit" type="button" aria-pressed="false">Edit</button>
      </div>
      <div class="history-chips" id="historyChips"></div>
      <div class="history-empty" id="historyEmpty" hidden></div>
    </section>

    <div id="activeArea"></div>
    <div id="emptyState"></div>

    <button class="done-head" id="doneToggle" type="button" aria-expanded="false" hidden>
      <span class="chev" aria-hidden="true">&#9654;</span>
      <span id="doneLabel">Done</span>
      <span class="rule" aria-hidden="true"></span>
    </button>
    <ul class="done-list" id="doneList" hidden></ul>
    <button class="clear" id="clearDone" type="button" hidden>Clear done items</button>

    <footer>Saved on this device &middot; works offline</footer>
  </div>

<script>
(function(){
  "use strict";

  var KEY = "shopping-list-v2";
  var OLD_KEY = "shopping-list-v1";
  var HEX = /^#[0-9a-fA-F]{6}$/;

  var DEFAULT_THEME = {
    "--bg":"#fbf7f2","--surface":"#ffffff","--ink":"#2b2438",
    "--muted":"#9a93a6","--line":"#efe7e0",
    "--accent":"#ff5c8a","--accent-2":"#ffb23e","--go":"#2fbf71"
  };

  var PRESETS = [
    {name:"Berry",  vars:{"--bg":"#fbf7f2","--surface":"#ffffff","--ink":"#2b2438","--muted":"#9a93a6","--line":"#efe7e0","--accent":"#ff5c8a","--accent-2":"#ffb23e","--go":"#2fbf71"}},
    {name:"Ocean",  vars:{"--bg":"#f1f6fb","--surface":"#ffffff","--ink":"#1c2b3a","--muted":"#8a97a8","--line":"#e1e8f0","--accent":"#2f80ed","--accent-2":"#56ccf2","--go":"#27ae60"}},
    {name:"Forest", vars:{"--bg":"#f3f7f0","--surface":"#ffffff","--ink":"#24301f","--muted":"#8b9683","--line":"#e4ebe0","--accent":"#4a8f3c","--accent-2":"#c2d12e","--go":"#2f9e6b"}},
    {name:"Dusk",   vars:{"--bg":"#1d1b29","--surface":"#2a2740","--ink":"#f2effa","--muted":"#9a93b5","--line":"#3a3656","--accent":"#ff79b0","--accent-2":"#ffc36b","--go":"#4dd998"}}
  ];

  /* ---------- State ---------- */
  function sanitizeItems(arr){
    var out=[];
    for(var i=0;i<arr.length;i++){
      var it=arr[i];
      if(it && typeof it.id==="string" && typeof it.text==="string"){
        out.push({
          id: it.id,
          text: String(it.text).slice(0,120),
          done: !!it.done,
          group: (typeof it.group==="string" ? it.group.slice(0,40) : "")
        });
      }
    }
    return out;
  }
  function sanitizeTheme(t){
    var out={};
    for(var k in DEFAULT_THEME){
      if(Object.prototype.hasOwnProperty.call(t,k) && typeof t[k]==="string" && HEX.test(t[k])) out[k]=t[k];
    }
    return out;
  }
  function histKey(t){ return (t||"").trim().toLowerCase(); }
  function sanitizeHistory(h){
    var out={};
    for(var k in h){
      if(!Object.prototype.hasOwnProperty.call(h,k)) continue;
      var e=h[k];
      if(e && typeof e.text==="string"){
        var key=histKey(e.text); if(!key) continue;
        out[key]={
          text: String(e.text).slice(0,120),
          group: (typeof e.group==="string" ? e.group.slice(0,40) : ""),
          count: (typeof e.count==="number" && e.count>0 ? Math.floor(e.count) : 1),
          last: (typeof e.last==="number" ? e.last : 0)
        };
      }
    }
    return out;
  }
  function loadState(){
    var s={items:[], groupOrder:[], theme:{}, history:{}};
    try{
      var raw=localStorage.getItem(KEY);
      if(raw){
        var p=JSON.parse(raw);
        if(p && typeof p==="object"){
          if(Array.isArray(p.items)) s.items=sanitizeItems(p.items);
          if(Array.isArray(p.groupOrder)) s.groupOrder=p.groupOrder.filter(function(g){return typeof g==="string" && g;});
          if(p.theme && typeof p.theme==="object") s.theme=sanitizeTheme(p.theme);
          if(p.history && typeof p.history==="object") s.history=sanitizeHistory(p.history);
        }
        return s;
      }
      var old=localStorage.getItem(OLD_KEY);
      if(old){
        var arr=JSON.parse(old);
        if(Array.isArray(arr)) s.items=sanitizeItems(arr);
      }
    }catch(e){}
    return s;
  }

  var state = loadState();
  var doneOpen = false;
  var histOpen = false;
  var histEditing = false;

  // Seed history with anything already on the list (e.g. from before this feature existed)
  state.items.forEach(function(i){
    var k=histKey(i.text);
    if(k && !state.history[k]) state.history[k]={ text:i.text.slice(0,120), group:i.group||"", count:1, last:Date.now() };
  });

  function pruneGroups(){
    var present={};
    state.items.forEach(function(i){ if(i.group) present[i.group]=true; });
    var ordered=state.groupOrder.filter(function(g){ return present[g]; });
    state.items.forEach(function(i){ if(i.group && ordered.indexOf(i.group)===-1) ordered.push(i.group); });
    state.groupOrder=ordered;
  }
  function save(){
    pruneGroups();
    try{ localStorage.setItem(KEY, JSON.stringify({items:state.items, groupOrder:state.groupOrder, theme:state.theme, history:state.history})); }catch(e){}
  }

  function byId(id){ for(var i=0;i<state.items.length;i++){ if(state.items[i].id===id) return state.items[i]; } return null; }
  function indexOf(id){ for(var i=0;i<state.items.length;i++){ if(state.items[i].id===id) return i; } return -1; }
  function uid(){ return Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,7); }

  function norm(s){ return (s||"").trim().toLowerCase(); }
  function findActiveDuplicate(text, group){
    var nt=norm(text), ng=norm(group);
    for(var i=0;i<state.items.length;i++){
      var it=state.items[i];
      if(!it.done && norm(it.text)===nt && norm(it.group)===ng) return it.id;
    }
    return null;
  }
  function flashItem(id){
    var el=document.querySelector('.item[data-id="'+id+'"]');
    if(!el) return;
    if(el.scrollIntoView) el.scrollIntoView({block:"center", behavior:"smooth"});
    el.classList.remove("flash");
    void el.offsetWidth;
    el.classList.add("flash");
    setTimeout(function(){ el.classList.remove("flash"); }, 1300);
  }

  function add(text, group){
    text=(text||"").trim();
    if(!text) return;
    group=(group||"").trim().slice(0,40);
    text=text.slice(0,120);
    var dupId=findActiveDuplicate(text, group);
    if(dupId){ flashItem(dupId); return; }
    state.items.push({ id:uid(), text:text, done:false, group:group });
    if(group && state.groupOrder.indexOf(group)===-1) state.groupOrder.push(group);
    histAdd(text, group);
    save(); render();
  }

  /* ---------- History store ---------- */
  function histAdd(text, group){
    var k=histKey(text); if(!k) return;
    var e=state.history[k];
    if(e){ e.count=(e.count||0)+1; e.last=Date.now(); e.text=text; e.group=group||""; }
    else state.history[k]={ text:text, group:group||"", count:1, last:Date.now() };
  }
  function histSetGroup(text, group){
    var e=state.history[histKey(text)];
    if(e) e.group=group||"";
  }
  function histRemove(k){ if(state.history[k]) delete state.history[k]; }
  function historyArray(){
    var out=[];
    for(var k in state.history){
      if(!Object.prototype.hasOwnProperty.call(state.history,k)) continue;
      var e=state.history[k];
      out.push({ key:k, text:e.text, group:e.group||"", count:e.count||1, last:e.last||0 });
    }
    out.sort(function(a,b){ if(b.count!==a.count) return b.count-a.count; return b.last-a.last; });
    return out;
  }

  /* ---------- Theme ---------- */
  function bgIsDark(hex){
    if(!HEX.test(hex)) return false;
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (0.2126*r + 0.7152*g + 0.0722*b)/255 < 0.5;
  }
  function applyTheme(theme){
    var root=document.documentElement;
    for(var k in DEFAULT_THEME){ root.style.removeProperty(k); }
    for(var k2 in theme){ if(HEX.test(theme[k2])) root.style.setProperty(k2, theme[k2]); }
    var tc = (theme && theme["--bg"]) || DEFAULT_THEME["--bg"];
    var meta=document.querySelector('meta[name="theme-color"]'); if(meta) meta.setAttribute("content", tc);
    // Match native popups (datalist suggestions, autofill) to the theme so their text stays readable
    root.style.colorScheme = bgIsDark(tc) ? "dark" : "light";
  }
  function effective(v){ return (state.theme && state.theme[v]) || DEFAULT_THEME[v]; }
  function updatePickers(){
    var inputs=document.querySelectorAll("#themePanel input[type=color]");
    for(var i=0;i<inputs.length;i++){ inputs[i].value=effective(inputs[i].getAttribute("data-var")); }
  }
  function buildPresets(){
    var wrap=document.getElementById("presets");
    wrap.textContent="";
    PRESETS.forEach(function(p){
      var cell=document.createElement("div"); cell.className="preset";
      var b=document.createElement("button");
      b.type="button"; b.className="swatch";
      b.setAttribute("aria-label","Apply "+p.name+" theme");
      b.style.background="linear-gradient(135deg,"+p.vars["--accent"]+","+p.vars["--accent-2"]+")";
      b.style.boxShadow="0 0 0 3px "+p.vars["--bg"]+",0 0 0 4px "+p.vars["--line"];
      b.addEventListener("click", function(){
        state.theme={};
        for(var k in p.vars){ state.theme[k]=p.vars[k]; }
        applyTheme(state.theme); updatePickers(); save();
      });
      var name=document.createElement("span"); name.className="swatch-name"; name.textContent=p.name;
      cell.appendChild(b); cell.appendChild(name);
      wrap.appendChild(cell);
    });
  }

  /* ---------- Rows ---------- */
  function makeCheckSvg(){
    var ns="http://www.w3.org/2000/svg";
    var svg=document.createElementNS(ns,"svg");
    svg.setAttribute("viewBox","0 0 24 24");
    var line=document.createElementNS(ns,"polyline");
    line.setAttribute("points","4,12 10,18 20,6");
    svg.appendChild(line);
    return svg;
  }

  function row(item){
    var li=document.createElement("li");
    li.className="item"+(item.done?" checked":"");
    li.setAttribute("data-id", item.id);

    if(!item.done){
      var handle=document.createElement("button");
      handle.type="button"; handle.className="handle";
      handle.textContent="\u283F";
      handle.setAttribute("aria-label","Reorder "+item.text+". Drag, or use arrow up and down.");
      handle.addEventListener("pointerdown", function(e){ startDrag(e, li); });
      handle.addEventListener("keydown", function(e){
        if(e.key==="ArrowUp"){ e.preventDefault(); moveWithinGroup(item.id,-1); }
        else if(e.key==="ArrowDown"){ e.preventDefault(); moveWithinGroup(item.id,1); }
      });
      li.appendChild(handle);
    }

    var tick=document.createElement("button");
    tick.type="button"; tick.className="tick";
    tick.setAttribute("aria-label",(item.done?"Move back to list: ":"Mark as bought: ")+item.text);
    tick.appendChild(makeCheckSvg());

    var label=document.createElement("span");
    label.className="label"; label.textContent=item.text;
    label.setAttribute("tabindex","0");
    label.setAttribute("role","button");
    label.setAttribute("aria-label","Edit name: "+item.text);
    label.addEventListener("click", function(e){ e.stopPropagation(); startEditLabel(item, label); });
    label.addEventListener("keydown", function(e){
      if(e.key==="Enter" || e.key===" "){ e.preventDefault(); startEditLabel(item, label); }
    });

    var mid;
    if(item.done && item.group){
      mid=document.createElement("span"); mid.className="label-wrap";
      mid.appendChild(label);
      var chip=document.createElement("span"); chip.className="chip"; chip.textContent=item.group;
      mid.appendChild(chip);
    }else{
      mid=label;
    }

    var del=document.createElement("button");
    del.type="button"; del.className="del";
    del.setAttribute("aria-label","Delete "+item.text);
    del.textContent="\u00d7";

    li.appendChild(tick); li.appendChild(mid); li.appendChild(del);

    function toggle(){
      var idx=indexOf(item.id); if(idx<0) return;
      if(!state.items[idx].done){
        li.classList.add("checked");
        setTimeout(function(){
          li.classList.add("leaving");
          setTimeout(function(){ var k=indexOf(item.id); if(k>=0) state.items[k].done=true; save(); render(); }, 380);
        }, 320);
      }else{
        var k2=indexOf(item.id); if(k2>=0) state.items[k2].done=false; save(); render();
      }
    }
    tick.addEventListener("click", toggle);

    del.addEventListener("click", function(e){
      e.stopPropagation();
      li.classList.add("leaving");
      setTimeout(function(){ var k=indexOf(item.id); if(k>=0) state.items.splice(k,1); save(); render(); }, 380);
    });

    return li;
  }

  /* ---------- Keyboard reorder ---------- */
  function moveWithinGroup(id, dir){
    var it=byId(id); if(!it || it.done) return;
    var sib=state.items.filter(function(x){ return !x.done && x.group===it.group; });
    var pos=sib.indexOf(it), np=pos+dir;
    if(np<0 || np>=sib.length) return;
    var other=sib[np];
    var i1=state.items.indexOf(it), i2=state.items.indexOf(other);
    var tmp=state.items[i1]; state.items[i1]=state.items[i2]; state.items[i2]=tmp;
    save(); render();
    var h=document.querySelector('.item[data-id="'+id+'"] .handle'); if(h) h.focus();
  }

  /* ---------- Inline editing ---------- */
  function beginEdit(targetEl, opts){
    var input=document.createElement("input");
    input.type="text";
    input.className="edit-input"+(opts.cls?(" "+opts.cls):"");
    input.maxLength=opts.maxLength;
    input.value=opts.value;
    input.setAttribute("aria-label", opts.aria);
    targetEl.parentNode.replaceChild(input, targetEl);
    input.focus();
    try{ input.setSelectionRange(0, input.value.length); }catch(e){ input.select(); }
    var finished=false;
    function finish(commit){
      if(finished) return; finished=true;
      if(commit) opts.onCommit(input.value);
      render();
    }
    input.addEventListener("keydown", function(e){
      if(e.key==="Enter"){ e.preventDefault(); finish(true); }
      else if(e.key==="Escape"){ e.preventDefault(); finish(false); }
    });
    input.addEventListener("blur", function(){ finish(true); });
    input.addEventListener("pointerdown", function(e){ e.stopPropagation(); });
    input.addEventListener("click", function(e){ e.stopPropagation(); });
  }

  function startEditLabel(item, labelEl){
    beginEdit(labelEl, {
      value:item.text, maxLength:120, aria:"Edit item name",
      onCommit:function(val){
        var v=(val||"").trim();
        var idx=indexOf(item.id);
        if(v && idx>=0){ state.items[idx].text=v.slice(0,120); save(); }
      }
    });
  }

  function renameGroup(oldName, newName){
    newName=(newName||"").trim().slice(0,40);
    if(!newName || newName===oldName) return false;
    for(var i=0;i<state.items.length;i++){ if(state.items[i].group===oldName) state.items[i].group=newName; }
    var pos=state.groupOrder.indexOf(oldName);
    if(pos>=0){
      if(state.groupOrder.indexOf(newName)>=0) state.groupOrder.splice(pos,1);
      else state.groupOrder[pos]=newName;
    }else if(state.groupOrder.indexOf(newName)===-1){
      state.groupOrder.push(newName);
    }
    for(var hk in state.history){
      if(Object.prototype.hasOwnProperty.call(state.history,hk) && state.history[hk].group===oldName) state.history[hk].group=newName;
    }
    return true;
  }

  function startEditGroup(groupName, nameEl){
    beginEdit(nameEl, {
      value:groupName, maxLength:40, cls:"edit-group", aria:"Rename group",
      onCommit:function(val){ if(renameGroup(groupName, val)) save(); }
    });
  }

  /* ---------- Drag reorder (mouse + touch) ---------- */
  var drag=null;
  function classClosest(el, cls){
    while(el && el.nodeType===1){
      if(el.classList && el.classList.contains(cls)) return el;
      el=el.parentNode;
    }
    return null;
  }
  function startDrag(e, li){
    if(e.pointerType==="mouse" && e.button!==0) return;
    e.preventDefault();
    var rect=li.getBoundingClientRect();
    var ph=document.createElement("li");
    ph.className="item placeholder";
    ph.style.height=rect.height+"px";
    li.parentNode.insertBefore(ph, li);
    drag={ li:li, ph:ph, offsetX:e.clientX-rect.left, offsetY:e.clientY-rect.top, moved:false };
    li.classList.add("dragging");
    li.style.width=rect.width+"px";
    li.style.height=rect.height+"px";
    li.style.left=rect.left+"px";
    li.style.top=rect.top+"px";
    document.body.appendChild(li);
    window.addEventListener("pointermove", onMove, {passive:false});
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
  }
  function onMove(e){
    if(!drag) return;
    e.preventDefault();
    var x=e.clientX, y=e.clientY;
    drag.li.style.left=(x-drag.offsetX)+"px";
    drag.li.style.top=(y-drag.offsetY)+"px";
    drag.moved=true;

    var m=64, sp=14, vh=window.innerHeight;
    if(y<m) window.scrollBy(0,-sp); else if(y>vh-m) window.scrollBy(0,sp);

    var prev=drag.li.style.pointerEvents;
    drag.li.style.pointerEvents="none";
    var under=document.elementFromPoint(x,y);
    drag.li.style.pointerEvents=prev;
    if(!under) return;

    var container=classClosest(under,"group-list");
    if(!container){
      var grp=classClosest(under,"group");
      if(grp) container=grp.querySelector(".group-list");
    }
    if(!container){
      var area=document.getElementById("activeArea");
      if(area && area.contains(under)){
        var lists=area.querySelectorAll(".group-list");
        if(lists.length) container=lists[lists.length-1];
      }
    }
    if(!container) return;

    var kids=container.querySelectorAll(".item"), before=null;
    for(var i=0;i<kids.length;i++){
      if(kids[i]===drag.ph) continue;
      var r=kids[i].getBoundingClientRect();
      if(y < r.top + r.height/2){ before=kids[i]; break; }
    }
    if(before) container.insertBefore(drag.ph, before);
    else container.appendChild(drag.ph);
  }
  function onUp(){
    if(!drag) return;
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
    window.removeEventListener("pointercancel", onUp);
    var li=drag.li, ph=drag.ph, moved=drag.moved;
    li.classList.remove("dragging");
    li.style.width=""; li.style.height=""; li.style.left=""; li.style.top=""; li.style.pointerEvents="";
    ph.parentNode.insertBefore(li, ph);
    ph.parentNode.removeChild(ph);
    drag=null;
    if(moved){ syncFromDom(); save(); render(); }
  }
  function syncFromDom(){
    var area=document.getElementById("activeArea");
    var lists=area.querySelectorAll(".group-list");
    var newActive=[], order=[], captured={};
    for(var i=0;i<lists.length;i++){
      var c=lists[i], g=c.getAttribute("data-group")||"";
      if(g && order.indexOf(g)===-1) order.push(g);
      var rows=c.querySelectorAll(".item");
      for(var j=0;j<rows.length;j++){
        var id=rows[j].getAttribute("data-id"); if(!id) continue;
        var it=byId(id);
        if(it){ it.group=g; newActive.push(it); captured[id]=true; }
      }
    }
    state.items.forEach(function(x){ if(!x.done && !captured[x.id]) newActive.push(x); });
    var done=state.items.filter(function(x){ return x.done; });
    state.items=newActive.concat(done);
    state.groupOrder=order;
    newActive.forEach(function(x){ histSetGroup(x.text, x.group); });
  }

  /* ---------- Render ---------- */
  function emptyState(emoji, big, small){
    var wrap=document.createElement("div"); wrap.className="empty";
    var e=document.createElement("span"); e.className="emoji"; e.textContent=emoji;
    var b=document.createElement("div"); b.className="big"; b.textContent=big;
    var s=document.createElement("div"); s.className="small"; s.textContent=small;
    wrap.appendChild(e); wrap.appendChild(b); wrap.appendChild(s);
    return wrap;
  }

  var els={};

  function render(){
    var area=document.getElementById("activeArea"); area.textContent="";
    var active=state.items.filter(function(i){ return !i.done; });
    var done=state.items.filter(function(i){ return i.done; });

    active.forEach(function(i){ if(i.group && state.groupOrder.indexOf(i.group)===-1) state.groupOrder.push(i.group); });
    var ungrouped=active.filter(function(i){ return !i.group; });
    var groupsWithActive=state.groupOrder.filter(function(g){ return active.some(function(i){ return i.group===g; }); });

    if(active.length>0){
      var uUl=document.createElement("ul");
      uUl.className="group-list"; uUl.setAttribute("data-group","");
      ungrouped.forEach(function(i){ uUl.appendChild(row(i)); });
      if(ungrouped.length===0 && groupsWithActive.length>0){
        uUl.classList.add("drop-empty");
        var hint=document.createElement("li"); hint.className="drop-hint"; hint.textContent="Drop here to remove from a group";
        uUl.appendChild(hint);
      }
      area.appendChild(uUl);

      groupsWithActive.forEach(function(g){
        var sec=document.createElement("div"); sec.className="group";
        var head=document.createElement("div"); head.className="group-head";
        var nm=document.createElement("button"); nm.type="button"; nm.className="group-name"; nm.textContent=g;
        nm.setAttribute("aria-label","Rename group: "+g);
        nm.addEventListener("click", function(){ startEditGroup(g, nm); });
        var ct=document.createElement("span"); ct.className="group-count";
        ct.textContent=active.filter(function(i){ return i.group===g; }).length;
        head.appendChild(nm); head.appendChild(ct);
        var ul=document.createElement("ul"); ul.className="group-list"; ul.setAttribute("data-group", g);
        active.filter(function(i){ return i.group===g; }).forEach(function(i){ ul.appendChild(row(i)); });
        sec.appendChild(head); sec.appendChild(ul);
        area.appendChild(sec);
      });
    }

    if(active.length===0 && done.length===0) els.count.textContent="Nothing here yet";
    else if(active.length===0) els.count.textContent="All done \u2014 nice!";
    else els.count.textContent=active.length+(active.length===1?" thing":" things")+" to get";

    els.empty.textContent="";
    if(active.length===0){
      els.empty.appendChild(done.length
        ? emptyState("\u2728","List's all checked off","Add more, or clear the done items below.")
        : emptyState("\ud83d\udcdd","Your list is empty","Type above to add your first item."));
    }

    if(done.length){
      els.toggle.hidden=false;
      els.doneLbl.textContent="Done ("+done.length+")";
      els.toggle.setAttribute("aria-expanded", doneOpen?"true":"false");
      els.done.hidden=!doneOpen;
      els.clear.hidden=!doneOpen;
      els.done.textContent="";
      done.forEach(function(i){ els.done.appendChild(row(i)); });
    }else{
      els.toggle.hidden=true; els.done.hidden=true; els.clear.hidden=true; doneOpen=false;
    }

    renderHistory();
  }

  function renderHistory(){
    var toggle=document.getElementById("historyToggle");
    var panel=document.getElementById("historyPanel");
    var arr=historyArray();
    if(arr.length===0){ toggle.hidden=true; panel.hidden=true; histOpen=false; return; }

    toggle.hidden=false;
    document.getElementById("historyToggleLabel").textContent="Previously added ("+arr.length+")";
    toggle.setAttribute("aria-expanded", histOpen?"true":"false");
    panel.hidden=!histOpen;
    if(!histOpen) return;

    var editBtn=document.getElementById("historyEdit");
    editBtn.setAttribute("aria-pressed", histEditing?"true":"false");
    editBtn.textContent=histEditing?"Done":"Edit";

    var f=(document.getElementById("historyFilter").value||"").trim().toLowerCase();
    var shown=f ? arr.filter(function(e){ return e.text.toLowerCase().indexOf(f)>=0; }) : arr;

    var activeKeys={};
    state.items.forEach(function(i){ if(!i.done) activeKeys[histKey(i.text)]=true; });

    var chips=document.getElementById("historyChips"); chips.textContent="";
    var emptyEl=document.getElementById("historyEmpty");
    if(shown.length===0){ emptyEl.hidden=false; emptyEl.textContent=f?"No matches.":"Nothing here yet."; return; }
    emptyEl.hidden=true;

    shown.forEach(function(e){
      var onList=!!activeKeys[e.key];
      var chip=document.createElement("button");
      chip.type="button";
      chip.className="hist-chip"+(onList?" on-list":"")+(histEditing?" editing":"");
      var t=document.createElement("span"); t.className="hist-chip-text"; t.textContent=e.text;
      chip.appendChild(t);
      if(e.group){ var g=document.createElement("span"); g.className="hist-chip-group"; g.textContent=e.group; chip.appendChild(g); }
      var mark=document.createElement("span"); mark.className="hist-chip-mark";
      mark.textContent = histEditing ? "\u00d7" : (onList ? "\u2713" : "+");
      chip.appendChild(mark);

      if(histEditing){
        chip.setAttribute("aria-label","Remove "+e.text+" from previously added");
        chip.addEventListener("click", function(){ histRemove(e.key); save(); renderHistory(); });
      }else if(onList){
        chip.setAttribute("aria-label", e.text+" is already on your list");
        chip.disabled=true;
      }else{
        chip.setAttribute("aria-label","Add "+e.text+(e.group?(" to "+e.group):"")+" to list");
        chip.addEventListener("click", function(){ add(e.text, e.group); });
      }
      chips.appendChild(chip);
    });
  }
  function init(){
    els.count=document.getElementById("count");
    els.empty=document.getElementById("emptyState");
    els.toggle=document.getElementById("doneToggle");
    els.doneLbl=document.getElementById("doneLabel");
    els.done=document.getElementById("doneList");
    els.clear=document.getElementById("clearDone");
    els.form=document.getElementById("addForm");
    els.input=document.getElementById("newItem");
    els.group=document.getElementById("newGroup");

    els.form.addEventListener("submit", function(e){
      e.preventDefault();
      add(els.input.value, els.group.value);
      els.input.value="";
      els.input.focus();
    });
    els.toggle.addEventListener("click", function(){ doneOpen=!doneOpen; render(); });
    els.clear.addEventListener("click", function(){
      state.items=state.items.filter(function(i){ return !i.done; });
      doneOpen=false; save(); render();
    });

    var themeBtn=document.getElementById("themeBtn");
    var panel=document.getElementById("themePanel");
    themeBtn.addEventListener("click", function(){
      var willOpen=panel.hasAttribute("hidden");
      if(willOpen){ panel.removeAttribute("hidden"); updatePickers(); } else { panel.setAttribute("hidden",""); }
      themeBtn.setAttribute("aria-expanded", willOpen?"true":"false");
    });
    document.getElementById("themeClose").addEventListener("click", function(){
      panel.setAttribute("hidden",""); themeBtn.setAttribute("aria-expanded","false");
    });
    document.getElementById("themeReset").addEventListener("click", function(){
      state.theme={}; applyTheme(state.theme); updatePickers(); save();
    });
    var colorInputs=document.querySelectorAll("#themePanel input[type=color]");
    for(var i=0;i<colorInputs.length;i++){
      colorInputs[i].addEventListener("input", function(){
        var v=this.getAttribute("data-var");
        if(HEX.test(this.value)){ state.theme[v]=this.value; applyTheme(state.theme); save(); }
      });
    }

    document.getElementById("historyToggle").addEventListener("click", function(){
      histOpen=!histOpen;
      if(!histOpen) histEditing=false;
      renderHistory();
      if(histOpen){ var fl=document.getElementById("historyFilter"); if(fl) fl.focus(); }
    });
    document.getElementById("historyEdit").addEventListener("click", function(){
      histEditing=!histEditing; renderHistory();
    });
    document.getElementById("historyFilter").addEventListener("input", function(){ renderHistory(); });

    applyTheme(state.theme);
    buildPresets();
    render();
  }

  init();
})();
</script>
</body>
</html>
